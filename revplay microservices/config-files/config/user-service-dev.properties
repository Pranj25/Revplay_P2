# User Service Development Configuration
server.port=8085

spring.application.name=user-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/revplay_user_db
spring.datasource.username=root
spring.datasource.password=Pranjal@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Application instance configuration
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# JWT Configuration
jwt.secret=revplay-secret-key-for-jwt-token-generation
jwt.expiration=86400000

# Logging
logging.level.com.revplay.userservice=DEBUG
