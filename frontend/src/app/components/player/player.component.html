@if (playerService.currentSong()) {
  <div class="player">
    <div class="song-info">
      <div class="album-art">
        <img [src]="'http://localhost:8081' + (playerService.currentSong()?.coverImage || '/images/default-cover.svg')" 
             [alt]="playerService.currentSong()?.title">
      </div>
      <div class="song-details">
        <div class="song-title">{{ playerService.currentSong()?.title }}</div>
        <div class="artist-name">{{ playerService.currentSong()?.artist?.artistName || 'Unknown Artist' }}</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="control-buttons">
        <button type="button" 
                title="Previous" 
                (click)="playerService.playPrevious()"
                [disabled]="!playerService.hasPrevious()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3.3 1a.7.7 0 01.7.7v5.15l9.95-5.744a.7.7 0 011.05.606v12.575a.7.7 0 01-1.05.607L4 9.149V14.3a.7.7 0 01-.7.7H1.7a.7.7 0 01-.7-.7V1.7a.7.7 0 01.7-.7h1.6z"/>
          </svg>
        </button>
        
        <button type="button" class="play-btn" (click)="playerService.togglePlayPause()" 
                [title]="playerService.isPlaying() ? 'Pause' : 'Play'">
          @if (playerService.isPlaying()) {
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"/>
            </svg>
          }
        </button>
        
        <button type="button" 
                title="Next" 
                (click)="playerService.playNext()"
                [disabled]="!playerService.hasNext()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M12.7 1a.7.7 0 00-.7.7v5.15L2.05 1.107A.7.7 0 001 1.712v12.575a.7.7 0 001.05.607L12 9.149V14.3a.7.7 0 00.7.7h1.6a.7.7 0 00.7-.7V1.7a.7.7 0 00-.7-.7h-1.6z"/>
          </svg>
        </button>
      </div>
      
      <div class="progress-bar">
        <span class="time">{{ formatTime(playerService.currentTime()) }}</span>
        <input type="range" 
               class="progress-slider"
               [value]="playerService.currentTime()" 
               [max]="playerService.duration() || 100"
               (input)="onSeek($event)"
               step="0.1">
        <span class="time">{{ formatTime(playerService.duration()) }}</span>
      </div>
    </div>

    <div class="right-controls">
      <button 
        *ngIf="authService.currentUser()"
        type="button" 
        class="favorite-btn"
        (click)="toggleFavorite()"
        [class.active]="isFavorite()"
        title="Add to favorites"
      >
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>
        </svg>
      </button>
      
      <div class="volume-control">
        <button type="button" (click)="playerService.setVolume(playerService.volume() > 0 ? 0 : 1)">
          @if (playerService.volume() === 0) {
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06zM9.5 8a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M9.741.85a.75.75 0 01.375.65v13a.75.75 0 01-1.125.65l-6.925-4a3.642 3.642 0 01-1.33-4.967 3.639 3.639 0 011.33-1.332l6.925-4a.75.75 0 01.75 0zm-6.924 5.3a2.139 2.139 0 000 3.7l5.8 3.35V2.8l-5.8 3.35zm8.683 4.29V5.56a2.75 2.75 0 010 4.88z"/>
            </svg>
          }
        </button>
        <input type="range" 
               class="volume-slider"
               [value]="playerService.volume()" 
               max="1"
               step="0.01"
               (input)="onVolumeChange($event)">
      </div>
    </div>
  </div>
}
