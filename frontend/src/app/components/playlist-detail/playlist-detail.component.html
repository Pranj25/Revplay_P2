<div class="playlist-detail-container" *ngIf="playlist">
  <div class="header">
    <button class="btn-back" (click)="goBack()">
      <svg viewBox="0 0 16 16">
        <path d="M15 8a.5.5 0 00-.5-.5H2.707l3.147-3.146a.5.5 0 10-.708-.708l-4 4a.5.5 0 000 .708l4 4a.5.5 0 00.708-.708L2.707 8.5H14.5A.5.5 0 0015 8z"/>
      </svg>
      Back
    </button>
  </div>
  
  <div class="playlist-header">
    <div class="playlist-cover">
      <svg viewBox="0 0 16 16">
        <path d="M5 3.5h6A1.5 1.5 0 0112.5 5v6a1.5 1.5 0 01-1.5 1.5H5A1.5 1.5 0 013.5 11V5A1.5 1.5 0 015 3.5z"/>
      </svg>
    </div>
    <div class="playlist-info">
      <span class="playlist-type">Playlist</span>
      <h1>{{ playlist.name }}</h1>
      <p *ngIf="playlist.description">{{ playlist.description }}</p>
      <span class="song-count">{{ playlist.songs.length || 0 }} songs</span>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn-add-song" (click)="openAddSongModal()">Add Songs</button>
  </div>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
  </div>
  
  <div *ngIf="!loading && playlist.songs && playlist.songs.length > 0" class="songs-list">
    <div *ngFor="let song of playlist.songs; let i = index" class="song-item">
      <div class="song-number">{{ i + 1 }}</div>
      <div class="song-cover" (click)="playSong(song)">
        <img [src]="getSongCover(song)" [alt]="song.title">
        <div class="play-overlay">
          <svg viewBox="0 0 16 16">
            <path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"/>
          </svg>
        </div>
      </div>
      <div class="song-info" (click)="playSong(song)">
        <div class="song-title">{{ song.title }}</div>
        <div class="song-artist">{{ song.artist?.artistName || 'Unknown Artist' }}</div>
      </div>
      <button class="btn-remove" (click)="removeSongFromPlaylist(song.id)">
        <svg viewBox="0 0 16 16">
          <path d="M4.646 4.646a.5.5 0 01.708 0L8 7.293l2.646-2.647a.5.5 0 01.708.708L8.707 8l2.647 2.646a.5.5 0 01-.708.708L8 8.707l-2.646 2.647a.5.5 0 01-.708-.708L7.293 8 4.646 5.354a.5.5 0 010-.708z"/>
        </svg>
      </button>
    </div>
  </div>
  
  <div *ngIf="!loading && (!playlist.songs || playlist.songs.length === 0)" class="no-songs">
    <p>No songs in this playlist</p>
    <button class="btn-add-first" (click)="openAddSongModal()">Add your first song</button>
  </div>
</div>

<div *ngIf="showAddSongModal" class="modal-overlay" (click)="closeAddSongModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Add Songs to Playlist</h3>
    <div class="songs-grid">
      <div *ngFor="let song of allSongs" class="song-card" [class.in-playlist]="isSongInPlaylist(song.id)">
        <div class="song-cover">
          <img [src]="getSongCover(song)" [alt]="song.title">
        </div>
        <div class="song-info">
          <div class="song-title">{{ song.title }}</div>
          <div class="song-artist">{{ song.artist?.artistName || 'Unknown Artist' }}</div>
        </div>
        <button 
          class="btn-add" 
          (click)="addSongToPlaylist(song.id)"
          [disabled]="isSongInPlaylist(song.id)"
        >
          {{ isSongInPlaylist(song.id) ? 'Added' : 'Add' }}
        </button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-close" (click)="closeAddSongModal()">Close</button>
    </div>
  </div>
</div>
