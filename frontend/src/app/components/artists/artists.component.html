<div class="artists-container">
  <h2 class="page-title">All Artists</h2>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading artists...</p>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="artists-grid">
    <div *ngFor="let artist of artists" class="artist-card" (click)="viewArtist(artist)">
      <div class="artist-image">
        <img [src]="getArtistImage(artist.profilePicture)" [alt]="artist.artistName">
      </div>
      <div class="artist-info">
        <h3 class="artist-name">{{ artist.artistName }}</h3>
        <p class="artist-genre" *ngIf="artist.genre">{{ artist.genre }}</p>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && !error && artists.length === 0" class="no-data">
    <svg viewBox="0 0 16 16" class="no-data-icon">
      <path d="M11 5a3 3 0 11-6 0 3 3 0 016 0zM8 7a2 2 0 100-4 2 2 0 000 4zm.256 7a4.474 4.474 0 01-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10c.26 0 .507.009.74.025.226-.341.496-.65.804-.918C9.077 9.038 8.564 9 8 9c-5 0-6 3-6 4s1 1 1 1h5.256z"/>
      <path d="M12.5 16a3.5 3.5 0 100-7 3.5 3.5 0 000 7zm.5-5v1h1a.5.5 0 010 1h-1v1a.5.5 0 01-1 0v-1h-1a.5.5 0 010-1h1v-1a.5.5 0 011 0z"/>
    </svg>
    <p>No artists</p>
    <span>Artists will appear here when songs are uploaded</span>
  </div>
</div>
