<div class="search-container">
  <div class="search-header">
    <h2 class="page-title">Search</h2>
    <div class="search-box">
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (keyup.enter)="search()"
        placeholder="Search for songs, artists, albums, or genres..."
        class="search-input"
      >
      <button (click)="search()" class="search-button">Search</button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Searching...</p>
  </div>

  <div *ngIf="!loading && searched && songs.length > 0" class="songs-grid">
    <div *ngFor="let song of songs" class="song-card">
      <div class="song-cover" (click)="playSong(song)">
        <img [src]="getSongCover(song)" [alt]="song.title">
        <div class="play-overlay">
          <svg viewBox="0 0 16 16">
            <path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"/>
          </svg>
        </div>
      </div>
      <div class="song-info">
        <div class="song-title">{{ song.title }}</div>
        <div class="song-artist">{{ song.artist?.artistName || 'Unknown Artist' }}</div>
      </div>
      <button 
        *ngIf="authService.currentUser()"
        class="favorite-btn" 
        (click)="toggleFavorite($event, song.id)"
        [class.active]="favoriteService.isFavorite(song.id)"
      >
        <svg viewBox="0 0 16 16">
          <path d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>
        </svg>
      </button>
    </div>
  </div>

  <div *ngIf="!loading && searched && songs.length === 0" class="no-data">
    <svg viewBox="0 0 24 24" class="no-data-icon">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <p>No songs found</p>
    <span>Try searching with different keywords</span>
  </div>

  <div *ngIf="!searched" class="no-data">
    <svg viewBox="0 0 24 24" class="no-data-icon">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <p>Start searching</p>
    <span>Enter a song name, artist, album, or genre</span>
  </div>
</div>
