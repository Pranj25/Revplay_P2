<div class="profile-container" *ngIf="authService.currentUser() as user">
  <h1 class="page-title">Profile</h1>
  
  <div class="profile-header">
    <div class="avatar-large">{{ user.username.charAt(0).toUpperCase() }}</div>
    <div class="user-details">
      <h2>{{ user.username }}</h2>
      <p class="user-role">{{ user.role }}</p>
    </div>
  </div>
  
  <div class="profile-section">
    <h3 class="section-title">
      <svg viewBox="0 0 16 16">
        <path d="M11 6a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path d="M0 8a8 8 0 1116 0A8 8 0 010 8zm8-7a7 7 0 00-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 008 1z"/>
      </svg>
      Personal Information
    </h3>
    
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Username</div>
        <div class="info-value">{{ user.username }}</div>
      </div>
      
      <div class="info-item">
        <div class="info-label">Email</div>
        <div class="info-value">{{ user.email }}</div>
      </div>
      
      <div class="info-item" *ngIf="user.displayName">
        <div class="info-label">Display Name</div>
        <div class="info-value">{{ user.displayName }}</div>
      </div>
      
      <div class="info-item">
        <div class="info-label">Role</div>
        <div class="info-value">
          <span class="role-badge" [class.artist]="user.role === 'ARTIST'">
            {{ user.role }}
          </span>
        </div>
      </div>
      
      <div class="info-item" *ngIf="user.gender">
        <div class="info-label">Gender</div>
        <div class="info-value">{{ user.gender }}</div>
      </div>
    </div>
  </div>
  
  <div class="profile-section">
    <h3 class="section-title">
      <svg viewBox="0 0 16 16">
        <path d="M8 16A8 8 0 108 0a8 8 0 000 16zm.93-9.412l-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 110-2 1 1 0 010 2z"/>
      </svg>
      Account
    </h3>
    
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Member Since</div>
        <div class="info-value">{{ getMemberSince() }}</div>
      </div>
    </div>
  </div>
  
 
</div>
