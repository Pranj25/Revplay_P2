<div class="upload-container">
  <div class="upload-box">
    <h1>Upload Song</h1>
    <p class="subtitle">Share your music with the world</p>

    @if (successMessage) {
      <div class="success-message">
        {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Song Title *</label>
        <input type="text" [(ngModel)]="title" name="title" 
               placeholder="Enter song title" required>
      </div>

      <div class="form-group">
        <label>Album Name *</label>
        <input type="text" [(ngModel)]="albumName" name="albumName" 
               placeholder="Enter album name" required>
      </div>

      <div class="form-group">
        <label>Artist Name *</label>
        <input type="text" [(ngModel)]="artistName" name="artistName" 
               placeholder="Enter artist name" required>
      </div>

      <div class="form-group">
        <label>Genre * (Select multiple)</label>
        <div class="genre-grid">
          <button type="button" 
                  *ngFor="let g of availableGenres" 
                  class="genre-btn"
                  [class.selected]="isGenreSelected(g)"
                  (click)="toggleGenre(g)">
            {{ g }}
          </button>
        </div>
        @if (selectedGenres.length > 0) {
          <div class="selected-genres">
            <span class="label">Selected:</span>
            <span *ngFor="let g of selectedGenres" class="genre-tag">
              {{ g }}
              <button type="button" class="remove-btn" (click)="removeGenre(g)">×</button>
            </span>
          </div>
        }
      </div>

      <div class="form-group">
        <label>Audio File (MP3) *</label>
        <input type="file" accept="audio/mpeg" 
               (change)="onAudioFileSelected($event)" required>
        @if (audioFile) {
          <p class="file-name">Selected: {{ audioFile.name }}</p>
        }
      </div>

      <div class="form-group">
        <label>Cover Image</label>
        <input type="file" accept="image/*" 
               (change)="onCoverFileSelected($event)">
        @if (coverFile) {
          <p class="file-name">Selected: {{ coverFile.name }}</p>
        }
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="uploading">
          {{ uploading ? 'Uploading...' : 'Upload Song' }}
        </button>
      </div>
    </form>
  </div>
</div>
