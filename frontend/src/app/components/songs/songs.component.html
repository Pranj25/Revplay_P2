<div class="songs-container">
  <h2 class="page-title">All Songs</h2>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading songs...</p>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && songs.length > 0" class="songs-grid">
    <div *ngFor="let song of songs" class="song-card">
      <div class="song-cover" (click)="playSong(song)">
        <img [src]="getSongCover(song)" [alt]="song.title">
        <div class="play-overlay">
          <svg viewBox="0 0 16 16">
            <path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"/>
          </svg>
        </div>
      </div>
      <div class="song-info">
        <div class="song-title">{{ song.title }}</div>
        <div class="song-artist">{{ song.artist?.artistName || 'Unknown Artist' }}</div>
      </div>
      <button 
        *ngIf="authService.currentUser()"
        class="favorite-btn" 
        (click)="toggleFavorite($event, song.id)"
        [class.active]="favoriteService.isFavorite(song.id)"
      >
        <svg viewBox="0 0 16 16">
          <path d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>
        </svg>
      </button>
    </div>
  </div>

  <div *ngIf="!loading && !error && songs.length === 0" class="no-data">
    <svg viewBox="0 0 16 16" class="no-data-icon">
      <path d="M11.536 14.01A8.473 8.473 0 0014.026 8a8.473 8.473 0 00-2.49-6.01l-.708.707A7.476 7.476 0 0113.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
      <path d="M10.121 12.596A6.48 6.48 0 0012.025 8a6.48 6.48 0 00-1.904-4.596l-.707.707A5.483 5.483 0 0111.025 8a5.483 5.483 0 01-1.61 3.89l.706.706z"/>
      <path d="M8.707 11.182A4.486 4.486 0 0010.025 8a4.486 4.486 0 00-1.318-3.182L8 5.525A3.489 3.489 0 019.025 8 3.49 3.49 0 018 10.475l.707.707zM6.717 3.55A.5.5 0 017 4v8a.5.5 0 01-.812.39L3.825 10.5H1.5A.5.5 0 011 10V6a.5.5 0 01.5-.5h2.325l2.363-1.89a.5.5 0 01.529-.06z"/>
    </svg>
    <p>No songs</p>
    <span>Upload your first song to get started</span>
  </div>
</div>
