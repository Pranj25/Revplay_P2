<div class="artist-detail-container">
  <button class="back-btn" (click)="goBack()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
    </svg>
    Back to Artists
  </button>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading songs...</p>
  </div>

  <div *ngIf="!loading && artist" class="artist-header">
    <div class="artist-image">
      <img [src]="artist.profilePicture ? 'http://localhost:8081' + artist.profilePicture : 'https://via.placeholder.com/200?text=Artist'" 
           [alt]="artist.artistName">
    </div>
    <div class="artist-info">
      <h1 class="artist-name">{{ artist.artistName }}</h1>
      <p class="artist-genre" *ngIf="artist.genre">{{ artist.genre }}</p>
      <p class="song-count">{{ songs.length }} {{ songs.length === 1 ? 'song' : 'songs' }}</p>
    </div>
  </div>

  <div *ngIf="!loading && songs.length > 0" class="songs-section">
    <h2>Songs</h2>
    <div class="songs-list">
      <div *ngFor="let song of songs; let i = index" class="song-item" (click)="playSong(song)">
        <div class="song-number">{{ i + 1 }}</div>
        <div class="song-cover">
          <img [src]="getSongCover(song)" [alt]="song.title">
        </div>
        <div class="song-info">
          <div class="song-title">{{ song.title }}</div>
          <div class="song-album">{{ song.album?.name || 'Unknown Album' }}</div>
        </div>
        <div class="song-genre">{{ song.genre }}</div>
        <button 
          *ngIf="authService.currentUser()"
          type="button"
          class="favorite-btn"
          (click)="toggleFavorite($event, song.id)"
          [class.active]="favoriteService.isFavorite(song.id)"
          title="Add to favorites"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && songs.length === 0" class="no-data">
    <svg viewBox="0 0 16 16" class="no-data-icon">
      <path d="M8 3a5 5 0 0 0-5 5v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8a6 6 0 1 1 12 0v5a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1V8a5 5 0 0 0-5-5z"/>
    </svg>
    <p>No songs found</p>
    <span>This artist has no songs yet</span>
  </div>
</div>
