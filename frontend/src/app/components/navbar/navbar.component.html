<div class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="logo">
      <span class="logo-text">RevPlay</span>
    </a>
    
    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/songs" routerLinkActive="active">Songs</a>
      <a routerLink="/artists" routerLinkActive="active">Artists</a>
      <a routerLink="/albums" routerLinkActive="active">Albums</a>
      @if (authService.currentUser()) {
        <a routerLink="/playlists" routerLinkActive="active">Playlists</a>
      }
      @if (isArtist()) {
        <a routerLink="/upload-song" routerLinkActive="active">Upload Song</a>
      }
    </div>
    
    <div class="nav-actions">
      @if (authService.currentUser(); as user) {
        <span class="username">{{ user.username }}</span>
        <button (click)="authService.logout()" class="btn-logout">Logout</button>
      } @else {
        <a routerLink="/login" class="btn-login">Log in</a>
        <a routerLink="/register" class="btn-signup">Sign up</a>
      }
    </div>
  </div>
</div>
