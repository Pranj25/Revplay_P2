<div class="playlists-container">
  <div class="header">
    <h2 class="page-title">Your Playlists</h2>
    <button class="btn-create" (click)="openCreateModal()">Create Playlist</button>
  </div>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading playlists...</p>
  </div>
  
  <div *ngIf="!loading && playlists.length > 0" class="playlists-grid">
    <div *ngFor="let playlist of playlists" class="playlist-card" [routerLink]="['/playlists', playlist.id]">
      <div class="playlist-cover">
        <svg viewBox="0 0 16 16">
          <path d="M5 3.5h6A1.5 1.5 0 0112.5 5v6a1.5 1.5 0 01-1.5 1.5H5A1.5 1.5 0 013.5 11V5A1.5 1.5 0 015 3.5z"/>
        </svg>
      </div>
      <div class="playlist-info">
        <div class="playlist-name">{{ playlist.name }}</div>
        <div class="playlist-description">{{ playlist.description || 'No description' }}</div>
      </div>
    </div>
  </div>
  
  <div *ngIf="!loading && playlists.length === 0" class="no-data">
    <svg viewBox="0 0 16 16" class="no-data-icon">
      <path d="M5 3.5h6A1.5 1.5 0 0112.5 5v6a1.5 1.5 0 01-1.5 1.5H5A1.5 1.5 0 013.5 11V5A1.5 1.5 0 015 3.5zm6 1h-6a.5.5 0 00-.5.5v6a.5.5 0 00.5.5h6a.5.5 0 00.5-.5V5a.5.5 0 00-.5-.5z"/>
      <path d="M8 8a.5.5 0 01.5.5v1.5H10a.5.5 0 010 1H8.5v1.5a.5.5 0 01-1 0v-1.5H6a.5.5 0 010-1h1.5V8.5A.5.5 0 018 8z"/>
    </svg>
    <p>No playlists</p>
    <span>Create your first playlist to organize your music</span>
  </div>
</div>

<div *ngIf="showCreateModal" class="modal-overlay" (click)="closeCreateModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Create Playlist</h3>
    <form (ngSubmit)="createPlaylist()">
      <div class="form-group">
        <label>Playlist Name *</label>
        <input type="text" [(ngModel)]="newPlaylistName" name="name" 
               placeholder="Enter playlist name" required>
      </div>
      
      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="newPlaylistDescription" name="description" 
                  placeholder="Enter description" rows="3"></textarea>
      </div>
      
      <div class="form-group checkbox">
        <label>
          <input type="checkbox" [(ngModel)]="isPublic" name="isPublic">
          <span>Make playlist public</span>
        </label>
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="closeCreateModal()">Cancel</button>
        <button type="submit" class="btn-submit">Create</button>
      </div>
    </form>
  </div>
</div>
